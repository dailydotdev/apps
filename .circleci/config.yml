version: 2.1

jobs:
  install_deps:
    docker:
      # cimg/node lags official Node releases; 24.17 not published yet, using closest available
      - image: cimg/node:24.16
    steps:
      - checkout
      - run:
          name: Enable pnpm
          command: |
            mkdir -p $HOME/.local/bin
            corepack enable --install-directory $HOME/.local/bin
            corepack prepare pnpm@10.33.4 --activate
      - restore_cache:
          keys:
            - deps-pnpm-10-33-4-{{ checksum "pnpm-lock.yaml" }}
            - deps-pnpm-10-33-4-{{ .Branch }}
      - run:
          name: Install dependencies
          command: pnpm install
      - save_cache:
          key: deps-pnpm-10-33-4-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ./node_modules
            - ./packages/eslint-config/node_modules
            - ./packages/eslint-rules/node_modules
            - ./packages/prettier-config/node_modules
            - ./packages/shared/node_modules
            - ./packages/webapp/node_modules
            - ./packages/extension/node_modules
            - ./packages/storybook/node_modules
  test_extension:
    docker:
      - image: cimg/node:24.16
    parallelism: 1
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-pnpm-10-33-4-{{ checksum "pnpm-lock.yaml" }}
            - deps-pnpm-10-33-4-{{ .Branch }}
      - run:
          name: Test
          command: |
            npm run pretest
            TEST=$(./node_modules/.bin/jest --listTests)
            echo $TEST | circleci tests run --command="xargs ./node_modules/.bin/jest --ci --runInBand --reporters=default --reporters=jest-junit --" --split-by=timings
          environment:
            JEST_JUNIT_OUTPUT_DIR: ../../test-results
          working_directory: packages/extension
      - store_test_results:
          path: ./test-results
  test_webapp:
    docker:
      - image: cimg/node:24.16
    parallelism: 1
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-pnpm-10-33-4-{{ checksum "pnpm-lock.yaml" }}
            - deps-pnpm-10-33-4-{{ .Branch }}
      - run:
          name: Test
          command: |
            npm run pretest
            TEST=$(./node_modules/.bin/jest --listTests)
            echo $TEST | circleci tests run --command="xargs ./node_modules/.bin/jest --ci --runInBand --reporters=default --reporters=jest-junit --" --split-by=timings
          environment:
            JEST_JUNIT_OUTPUT_DIR: ../../test-results
          working_directory: packages/webapp
      - store_test_results:
          path: ./test-results
  lint_shared:
    docker:
      - image: cimg/node:24.16
    resource_class: large
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-pnpm-10-33-4-{{ checksum "pnpm-lock.yaml" }}
            - deps-pnpm-10-33-4-{{ .Branch }}
      - run:
          name: Lint
          command: npm run pretest
          working_directory: packages/shared
  typecheck_strict_changed:
    docker:
      - image: cimg/node:24.16
    resource_class: large
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-pnpm-10-33-4-{{ checksum "pnpm-lock.yaml" }}
            - deps-pnpm-10-33-4-{{ .Branch }}
      - run:
          name: Fetch base branch
          command: git fetch origin main
      - run:
          name: Check changed files in strict mode
          command: npm run typecheck:strict:changed
  test_shared:
    docker:
      - image: cimg/node:24.16
    parallelism: 1
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-pnpm-10-33-4-{{ checksum "pnpm-lock.yaml" }}
            - deps-pnpm-10-33-4-{{ .Branch }}
      - run:
          name: Test
          command: |
            TEST=$(./node_modules/.bin/jest --listTests)
            echo $TEST | circleci tests run --command="xargs ./node_modules/.bin/jest --ci --runInBand --reporters=default --reporters=jest-junit --" --split-by=timings
          environment:
            JEST_JUNIT_OUTPUT_DIR: ../../test-results
          working_directory: packages/shared
      - store_test_results:
          path: ./test-results
  build_extension:
    docker:
      - image: cimg/node:24.16
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Enable pnpm
          command: |
            mkdir -p $HOME/.local/bin
            corepack enable --install-directory $HOME/.local/bin
            corepack prepare pnpm@10.33.4 --activate
      - restore_cache:
          keys:
            - deps-pnpm-10-33-4-{{ checksum "pnpm-lock.yaml" }}
            - deps-pnpm-10-33-4-{{ .Branch }}
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Build Extension
          command: pnpm --filter extension build
workflows:
  build:
    jobs:
      - install_deps
      - test_extension:
          requires:
            - install_deps
      - test_webapp:
          requires:
            - install_deps
      - lint_shared:
          requires:
            - install_deps
      - typecheck_strict_changed:
          requires:
            - install_deps
      - test_shared:
          requires:
            - install_deps
      - build_extension:
          requires:
            - install_deps
