<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>daily.dev — App Store CPP Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg-default: #0E1217;
    --bg-subtle: #1C1F26;
    --bg-float: #22262D;
    --border-subtle: #2D313A;
    --text-primary: #FFFFFF;
    --text-secondary: #C1C9D6;
    --text-tertiary: #A8B3CF;
    --text-quaternary: #6C7A96;
    --accent-avocado: #1DDC6F;
    --accent-blueCheese: #2CDCE6;
    --accent-cabbage: #CE3DF3;
    --accent-ketchup: #FF5454;
    --accent-cheese: #FFDF00;
    --accent-bun: #FF7A2B;
    --accent-water: #3169F5;
    --accent-onion: #5F37E9;
    --accent-lettuce: #92F21D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background:
      radial-gradient(900px 420px at -10% -10%, rgba(95,55,233,0.22) 0%, rgba(95,55,233,0) 60%),
      radial-gradient(860px 360px at 110% 0%, rgba(28,220,230,0.16) 0%, rgba(28,220,230,0) 58%),
      linear-gradient(180deg, #0B0F14 0%, #0E1217 40%, #0E1217 100%);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .top-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,18,23,0.86);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(193,201,214,0.16);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .top-bar .brand { flex-shrink: 0; }
  .top-bar .brand h1 {
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 800;
    background: linear-gradient(135deg, #FFFFFF 0%, #C1C9D6 55%, #2CDCE6 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.2;
  }
  .top-bar .brand .sub { font-size: 10px; color: var(--text-quaternary); font-weight: 500; }
  .top-bar .spacer { flex: 1; }
  .dl-all-link {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.04); color: var(--text-secondary);
    border: 1px solid rgba(193,201,214,0.14);
    padding: 5px 12px; border-radius: 7px; font-size: 11px;
    font-family: 'Inter', sans-serif; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .dl-all-link:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

  .tabs {
    display: flex; gap: 4px; padding: 12px 28px;
    overflow-x: auto; background: rgba(14,18,23,0.75);
    border-bottom: 1px solid rgba(193,201,214,0.12);
    backdrop-filter: blur(14px);
  }
  .tab {
    padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
    border: 1px solid transparent; color: var(--text-tertiary);
    display: flex; align-items: center; gap: 6px;
  }
  .tab .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tab:hover { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
  .tab.active {
    border-color: rgba(95,55,233,0.45);
    background: linear-gradient(135deg, rgba(95,55,233,0.22), rgba(49,105,245,0.18));
    color: white;
  }

  .cpp-section { display: none; padding: 28px; }
  .cpp-section.active {
    display: block;
    max-width: 1700px;
    margin: 0 auto;
  }
  .cpp-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .cpp-header-left {
    display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1;
  }
  .cpp-header h2 {
    font-family:'Poppins',sans-serif; font-size: 17px; font-weight: 800;
    white-space: nowrap; margin: 0;
  }
  .cpp-header .subtitle {
    font-size: 11px; color: var(--text-tertiary);
    white-space: nowrap; flex-shrink: 0;
  }
  .cpp-header .topic-angle {
    width: 100%; order: 10;
    font-size: 12px; color: var(--text-secondary);
    line-height: 1.45; margin: -4px 0 0;
  }
  .cpp-header-controls {
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(193,201,214,0.14);
    border-radius: 8px; padding: 3px 4px;
  }
  .cpp-header-controls select {
    background: transparent; color: var(--text-primary);
    border: none; padding: 4px 6px; border-radius: 5px;
    font-size: 10px; font-family: 'Inter', sans-serif;
    font-weight: 600; cursor: pointer; outline: none;
  }
  .cpp-header-controls select:hover { background: rgba(255,255,255,0.06); }
  .cpp-header-controls .dl-btn {
    padding: 4px 10px; border-radius: 5px; font-size: 10px;
    font-family: 'Inter', sans-serif; font-weight: 700;
    cursor: pointer; border: none; white-space: nowrap;
    color: white;
    background: linear-gradient(135deg, rgba(95,55,233,0.8), rgba(49,105,245,0.75));
    transition: all 0.15s;
  }
  .cpp-header-controls .dl-btn:hover { filter: brightness(1.15); }

  .screenshots-row {
    display: flex; gap: 24px; overflow-x: auto;
    padding: 8px 0 32px; scroll-snap-type: x mandatory;
  }
  .screenshot-slot { flex: 0 0 auto; scroll-snap-align: start; text-align: center; }
  .screenshot-slot.clickable-screen {
    cursor: pointer;
  }
  .screen-dl-btn {
    margin-top: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid rgba(193,201,214,0.22);
    background: rgba(18, 23, 31, 0.78);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease, background 0.15s ease;
  }
  .screen-dl-btn:hover {
    border-color: rgba(193,201,214,0.45);
    background: rgba(26, 32, 42, 0.9);
    transform: translateY(-1px);
  }
  .screenshot-slot.clickable-screen .ss-canvas {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .screenshot-slot.clickable-screen:hover .ss-canvas {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35);
  }
  .screenshot-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: var(--text-quaternary); margin-bottom: 10px;
  }

  /* ===== APP STORE SCREENSHOT CANVAS ===== */
  .ss-canvas {
    width: 280px; height: 607px; border-radius: 0;
    position: relative; overflow: hidden;
    border: 1px solid rgba(193,201,214,0.18);
    box-shadow: 0 10px 32px rgba(0,0,0,0.45);
  }
  .ss-canvas-tablet {
    width: 384px; height: 288px; border-radius: 0;
    position: relative; overflow: hidden;
    border: 1px solid rgba(193,201,214,0.18);
    box-shadow: 0 10px 32px rgba(0,0,0,0.45);
  }
  .ss-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 50% 100%, rgba(157,112,248,1) 0%, rgba(157,112,248,0) 55%),
      radial-gradient(ellipse at 50% 0%, rgba(254,122,182,1) 0%, rgba(254,122,182,0) 55%),
      linear-gradient(180deg, #BF29F0 0%, #BF29F0 100%);
  }
  .ss-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; }

  /* Headline zone */
  .ss-headline {
    padding: 28px 18px 6px; text-align: left;
  }
  .ss-headline h3 {
    font-family: 'Poppins', sans-serif; font-weight: 800;
    font-size: 28px; color: white; line-height: 1.05; letter-spacing: -0.3px;
    max-width: 244px; overflow: hidden;
  }
  .ss-headline .sub {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 16px; color: rgba(255,255,255,0.64); margin-top: 3px; line-height: 1.15;
    max-width: 244px;
  }

  /* Headline BOTTOM variant (text at bottom like Tab 2, Tab 4) */
  .ss-headline-bottom {
    padding: 0 18px 12px; text-align: center; margin-top: auto;
  }
  .ss-headline-bottom h3 {
    font-family: 'Poppins', sans-serif; font-weight: 800;
    font-size: 28px; color: white; line-height: 1.05;
    max-width: 244px; margin: 0 auto; overflow: hidden;
  }
  .ss-headline-bottom .sub {
    font-family: 'Poppins', sans-serif; font-weight: 700;
    font-size: 16px; color: rgba(255,255,255,0.64); margin-top: 2px;
    max-width: 244px; margin-left: auto; margin-right: auto;
  }

  /* Social proof */
  .ss-social {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 4px 14px 10px;
  }
  .ss-stars { font-size: 18px; letter-spacing: 2px; }
  .ss-quote { font-family: 'Poppins', sans-serif; font-size: 10px; font-weight: 500; color: white; text-align: center; max-width: 252px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ss-quote .author { color: rgba(255,255,255,0.5); font-weight: 400; }

  /* ===== PHONE MOCKUP ===== */
  .phone-zone {
    flex: 1; display: flex; justify-content: center; align-items: flex-start;
    padding: 4px 22px 0; position: relative;
  }
  .phone {
    width: 200px; height: 100%; position: relative;
    border: 6px solid #000; border-bottom: none; border-radius: 24px 24px 0 0;
    box-shadow: 0px -0.5px 0px 8px rgba(255,255,255,0.64), 0 8px 32px rgba(0,0,0,0.4);
    overflow: hidden; background: var(--bg-default);
  }
  .phone-notch {
    position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 12px; background: #000; border-radius: 8px; z-index: 20;
  }

  /* ===== REAL APP UI INSIDE PHONE ===== */
  .app {
    position: absolute; inset: 0; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif;
    display: flex; flex-direction: column; background: var(--bg-default);
  }

  /* App header — matches MobileFeedActions */
  .app-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 8px 4px; gap: 4px;
  }
  .app-logo {
    display: flex; align-items: center; gap: 3px;
  }
  .app-logo svg { width: 14px; height: 8px; }
  .app-logo .logo-text {
    font-size: 8px; font-weight: 800; color: white;
    font-family: 'Inter', sans-serif; letter-spacing: -0.2px;
  }
  .app-hdr-right {
    display: flex; align-items: center; gap: 4px;
  }
  .streak-btn {
    display: flex; align-items: center; gap: 2px;
    font-size: 6px; font-weight: 700; color: #FF7A2B;
  }
  .streak-btn svg { width: 10px; height: 10px; fill: #FF7A2B; }
  .streak-num { font-variant-numeric: tabular-nums; }
  .hdr-divider {
    width: 1px; height: 10px; background: rgba(168,179,207,0.14);
  }
  .hdr-icon-btn {
    width: 14px; height: 14px; display: flex; align-items: center; justify-content: center;
    color: var(--text-tertiary);
  }
  .hdr-icon-btn svg { width: 10px; height: 10px; fill: var(--text-tertiary); }
  .hdr-avatar {
    width: 14px; height: 14px; border-radius: 50%;
    background: linear-gradient(135deg, #6C5CE7, #A855F7);
  }

  /* Tab nav — matches FeedNav tabs */
  .app-tabs {
    display: flex; gap: 0; padding: 2px 6px;
    border-bottom: 1px solid rgba(168,179,207,0.14);
    overflow-x: hidden;
  }
  .app-tab {
    font-size: 6.5px; font-weight: 600; padding: 4px 6px;
    color: var(--text-tertiary); white-space: nowrap;
    position: relative;
  }
  .app-tab.on {
    color: white; font-weight: 700;
  }
  .app-tab.on::after {
    content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
    width: 16px; height: 2px; background: white; border-radius: 1px;
  }

  /* Post card — matches ArticleList layout */
  .post-card {
    padding: 8px 8px 4px; border-top: 1px solid rgba(168,179,207,0.14);
  }
  .post-hdr {
    display: flex; align-items: center; gap: 4px; margin-bottom: 4px;
  }
  .post-src-icon {
    width: 14px; height: 14px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 6px; font-weight: 800; color: white;
  }
  .post-meta {
    flex: 1; display: flex; flex-direction: column; gap: 1px;
  }
  .post-meta .src-name { font-size: 6px; font-weight: 700; color: var(--text-secondary); }
  .post-meta .post-date { font-size: 5px; color: var(--text-quaternary); }
  .post-more {
    font-size: 8px; color: var(--text-tertiary); letter-spacing: 1px; cursor: pointer;
  }
  .post-body {
    display: flex; gap: 6px; align-items: flex-start; margin-bottom: 3px;
  }
  .post-title {
    font-size: 7.5px; font-weight: 700; color: white; line-height: 1.3;
    flex: 1; display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .post-thumb {
    width: 50px; height: 36px; border-radius: 8px; flex-shrink: 0;
    object-fit: cover; display: block;
  }
  .post-tags {
    display: flex; gap: 3px; padding: 0 0 2px;
  }
  .post-tag {
    font-size: 5px; color: var(--text-quaternary); font-weight: 500;
  }
  .post-actions {
    display: flex; align-items: center; gap: 0; padding: 3px 0 2px;
    border-top: 1px solid rgba(168,179,207,0.08);
  }
  .post-action {
    display: flex; align-items: center; gap: 2px;
    font-size: 5.5px; color: var(--text-tertiary);
    padding: 2px 0;
    flex: 1;
  }
  .post-action.upvote { color: var(--accent-avocado); flex: 1.2; }
  .post-action.downvote { color: var(--accent-ketchup); flex: 0.5; }
  .post-action.comment { color: var(--accent-blueCheese); flex: 1.2; }
  .post-action.bookmark { color: var(--accent-bun); flex: 0.5; }
  .post-action.link { color: var(--text-tertiary); flex: 0.5; }
  .post-action svg { width: 8px; height: 8px; }
  .post-action span { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* Tags onboarding — matches EditTag */
  .tags-header {
    padding: 20px 10px 4px; text-align: center;
  }
  .tags-title {
    font-size: 11px; font-weight: 800; color: white; line-height: 1.2;
  }
  .tags-sub {
    font-size: 6px; color: var(--text-tertiary); margin-top: 3px; line-height: 1.3;
  }
  .tag-grid {
    padding: 6px 8px; display: flex; flex-wrap: wrap; gap: 4px;
    justify-content: center;
  }
  .tag-pill {
    font-size: 6px; font-weight: 600; padding: 4px 8px;
    border-radius: 10px; background: transparent;
    border: 1px solid rgba(168,179,207,0.24); color: var(--text-tertiary);
    transition: all 0.15s;
  }
  .tag-pill.on {
    border-color: var(--accent-cabbage); color: white;
    background: rgba(206,61,243,0.12);
  }
  .tag-check {
    font-size: 5px; margin-right: 2px; color: var(--accent-cabbage);
  }

  /* Search bar — matches SearchPanelInput */
  .app-search-bar {
    margin: 4px 8px; padding: 5px 8px; border-radius: 10px;
    background: var(--bg-subtle); border: 1px solid rgba(168,179,207,0.14);
    font-size: 6px; color: var(--text-tertiary);
    display: flex; align-items: center; gap: 4px;
  }
  .app-search-bar svg { width: 10px; height: 10px; fill: var(--text-tertiary); opacity: 0.6; }
  .app-search-bar.active { border-color: var(--accent-cabbage); }
  .search-placeholder { color: var(--text-quaternary); }
  .search-query { color: white; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }

  /* AI answer */
  .ai-answer {
    margin: 4px 8px; padding: 8px; border-radius: 10px;
    background: var(--bg-subtle);
    border: 1px solid rgba(168,179,207,0.14);
  }
  .ai-label {
    display: flex; align-items: center; gap: 3px;
    font-size: 6px; font-weight: 700; color: var(--accent-cabbage);
    margin-bottom: 4px;
  }
  .ai-label svg { width: 8px; height: 8px; fill: var(--accent-cabbage); }
  .ai-answer p { font-size: 5.5px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
  .ai-sources {
    display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px;
  }
  .ai-answer .src-tag {
    font-size: 5px; padding: 2px 5px; border-radius: 6px;
    background: var(--bg-float); color: var(--accent-blueCheese);
    border: 1px solid rgba(44,220,230,0.2);
  }

  /* Squad list — matches SquadList rows */
  .squad-row {
    margin: 0 8px; padding: 8px 0;
    display: flex; gap: 6px; align-items: center;
    border-bottom: 1px solid rgba(168,179,207,0.08);
  }
  .squad-av {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0;
  }
  .squad-info { flex: 1; }
  .squad-info .squad-name { font-size: 7px; font-weight: 700; color: white; }
  .squad-info .squad-handle { font-size: 5px; color: var(--text-quaternary); }
  .squad-info .squad-members { font-size: 5px; color: var(--text-tertiary); margin-top: 1px; }
  .squad-join {
    font-size: 5.5px; font-weight: 700; color: white;
    padding: 3px 8px; border-radius: 8px;
    background: var(--accent-cabbage);
  }
  .squads-section-title {
    padding: 6px 8px 2px; font-size: 7px; font-weight: 700; color: white;
  }

  /* Bookmark folder */
  .bm-folder {
    margin: 0 8px; padding: 8px 0;
    display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid rgba(168,179,207,0.08);
  }
  .bm-emoji { font-size: 10px; }
  .bm-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
  .bm-name { font-size: 7px; font-weight: 600; color: white; }
  .bm-ct { font-size: 5px; color: var(--text-tertiary); }
  .bm-section-title {
    padding: 6px 8px 2px; font-size: 7px; font-weight: 700; color: white;
  }

  /* DevCard — matches real DevCard component */
  .devcard {
    margin: 16px auto 6px; width: 155px;
    border-radius: 16px; overflow: hidden;
    background: linear-gradient(152.83deg, #525866 0%, #0E1217 20%, #525866 47.5%, #2C303A 67%, #0E1217 83%, #525866 100%);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .devcard-cover {
    height: 50px; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .devcard-avatar-wrap {
    position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
    width: 28px; height: 28px; border-radius: 12px;
    border: 2px solid var(--bg-default);
    overflow: hidden;
  }
  .devcard-avatar-img {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #6C5CE7, #A855F7);
    border-radius: 10px;
  }
  .devcard-body {
    padding: 16px 8px 6px; text-align: center;
  }
  .devcard-name { font-size: 9px; font-weight: 800; color: white; }
  .devcard-handle { font-size: 5px; color: var(--text-tertiary); margin-top: 1px; }
  .devcard-stats {
    display: flex; gap: 2px; justify-content: center;
    margin: 6px 0 4px; padding: 4px 6px;
    background: rgba(14,18,23,0.8); border-radius: 10px;
  }
  .devcard-stat {
    flex: 1; text-align: center; padding: 2px 0;
  }
  .stat-icon { font-size: 7px; }
  .stat-val { font-size: 7px; font-weight: 800; color: white; }
  .stat-label { font-size: 4px; color: var(--text-quaternary); }
  .devcard-bio {
    font-size: 5px; color: var(--text-secondary); line-height: 1.4;
    padding: 2px 4px; margin-top: 2px;
  }
  .devcard-tags {
    display: flex; flex-wrap: wrap; gap: 2px; justify-content: center;
    margin-top: 4px; padding: 0 4px;
  }
  .devcard-tag {
    font-size: 4.5px; padding: 2px 4px; border-radius: 4px;
    background: var(--bg-float); color: var(--text-tertiary);
    border: 1px solid rgba(168,179,207,0.14);
  }
  .devcard-sources {
    display: flex; gap: 3px; justify-content: center;
    margin-top: 4px;
  }
  .devcard-src-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .devcard-footer {
    display: flex; align-items: center; justify-content: center; gap: 3px;
    padding: 4px 0 6px;
    font-size: 5px; font-weight: 700; color: var(--text-quaternary);
  }
  .devcard-footer svg { width: 8px; height: 5px; fill: var(--text-quaternary); }

  /* Article/Post detail page — matches PostContent */

const PREVIEW_CANVAS_WIDTH = 280;
const PREVIEW_CANVAS_HEIGHT = 607;
const EXPORT_PRESETS = {
  iphone: { id: 'iphone', label: 'iPhone', width: 1320, height: 2868 },
  tablet: { id: 'tablet', label: 'Tablet', width: 2752, height: 2064 },
};
let selectedExportMode = 'iphone';

function getExportPreset(mode = selectedExportMode) {
  return EXPORT_PRESETS[mode] || EXPORT_PRESETS.iphone;
}

function getExportDimensionLabel(mode = selectedExportMode) {
  const preset = getExportPreset(mode);
  return `${preset.label} ${preset.width}×${preset.height}`;
}

function getDimWatermarkLabel() {
  const preset = getExportPreset();
  return `${preset.width}×${preset.height}`;
}

function onExportModeChange(event) {
  setExportMode(event?.target?.value || 'iphone');
}

function onSectionExportChange(event) {
  setExportMode(event?.target?.value || 'iphone');
}

function setExportMode(mode) {
  if (!EXPORT_PRESETS[mode]) return;
  selectedExportMode = mode;
  document.querySelectorAll('.section-export-select').forEach(sel => {
    if (sel.value !== mode) sel.value = mode;
  });
  const editorSel = document.getElementById('editor-export-select');
  if (editorSel && editorSel.value !== mode) editorSel.value = mode;
  renderDT();
  updateDownloadAllButton();
  updateEditorPreviewMeta();
  if (document.getElementById('view-editor').style.display === 'block') {
    renderEditorPreview();
  }
}

function updateDownloadAllButton() {
  const btn = document.getElementById('download-all-btn');
  if (!btn) return;
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download All .zip';
}

function updateEditorPreviewMeta() {
  const meta = document.querySelector('.editor-preview-meta');
  if (!meta) return;
  meta.textContent = `Preview · ${getExportDimensionLabel()} export`;
}

const TABLET_CANVAS_WIDTH = 384;
const TABLET_CANVAS_HEIGHT = 288;
const EXPORT_LIB_SOURCES = {
  htmlToImage: 'https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js',
  jsZip: 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js',
};
let exportLibsPromise = null;
const renderedSectionIds = new Set();

function loadExternalScript(src) {
  return new Promise((resolve, reject) => {
    const existing = document.querySelector(`script[data-src="${src}"]`);
    if (existing) {
      if (existing.dataset.loaded === 'true') {
        resolve();
        return;
      }
      existing.addEventListener('load', () => resolve(), { once: true });
      existing.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), { once: true });
      return;
    }

    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.dataset.src = src;
    script.addEventListener('load', () => {
      script.dataset.loaded = 'true';
      resolve();
    }, { once: true });
    script.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), { once: true });
    document.head.appendChild(script);
  });
}

async function ensureExportLibsLoaded() {
  if (window.htmlToImage && window.JSZip) return;
  if (!exportLibsPromise) {
    exportLibsPromise = Promise.all([
      loadExternalScript(EXPORT_LIB_SOURCES.htmlToImage),
      loadExternalScript(EXPORT_LIB_SOURCES.jsZip),
    ]);
  }
  await exportLibsPromise;
  if (!window.htmlToImage || !window.JSZip) {
    throw new Error('Export libraries did not initialize correctly');
  }
}

function optimizeImages(root) {
  const images = root.querySelectorAll('img');
  images.forEach((img, index) => {
    if (!img.hasAttribute('decoding')) img.setAttribute('decoding', 'async');
    if (!img.hasAttribute('loading')) {
      img.setAttribute('loading', index < 6 ? 'eager' : 'lazy');
    }
    if (!img.hasAttribute('fetchpriority')) {
      img.setAttribute('fetchpriority', index < 6 ? 'high' : 'low');
    }
  });
}

function ensureSectionRendered(cppId) {
  if (renderedSectionIds.has(cppId)) return;
  const section = document.getElementById(`cpp-${cppId}`);
  if (!section) return;
  const topic = CPP.find((cpp) => cpp.id === cppId);
  if (!topic) return;
  const row = section.querySelector('.screenshots-row');
  if (!row) return;
  row.innerHTML = topic.screens.map((screen, index) => mkScreen(topic, screen, index)).join('');
  optimizeImages(row);
  attachPerScreenDownloadButtons(section, cppId);
  section.dataset.rendered = 'true';
  renderedSectionIds.add(cppId);
}

const TRANSPARENT_PIXEL_DATA_URL = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';

function formatExportError(error) {
  if (!error) return 'Unknown error';
  if (typeof error === 'string') return error;
  if (error instanceof Error && error.message) {
    if (error.message.includes('[object Event]')) {
      const eventDetails = formatExportError(error.cause);
      return `Asset load event failed during export. ${eventDetails !== 'Unknown error' ? eventDetails : 'Check image URL/CORS and reload.'}`;
    }
    return error.message;
  }
  if (typeof Event !== 'undefined' && error instanceof Event) {
    const source = error.target?.src || error.currentTarget?.src;
    if (source) return `${error.type || 'error'} while loading asset: ${source}`;
    return `Asset event: ${error.type || 'error'}`;
  }
  if (error?.type && error?.target?.src) {
    return `${error.type} while loading asset: ${error.target.src}`;
  }
  if (error?.type) return `Asset event: ${error.type}`;
  try {
    return JSON.stringify(error);
  } catch {
    return String(error);
  }
}

async function renderCanvasToPreset(canvas, preset) {
  const isTablet = canvas.classList.contains('ss-canvas-tablet');
  const domWidth = isTablet ? TABLET_CANVAS_WIDTH : PREVIEW_CANVAS_WIDTH;
  const pixelRatio = preset.width / domWidth;
  const captureOptions = {
    cacheBust: true,
    imagePlaceholder: TRANSPARENT_PIXEL_DATA_URL,
    pixelRatio,
    style: {
      transform: 'none',
      margin: '0',
    },
  };

  try {
    const blob = await htmlToImage.toBlob(canvas, captureOptions);
    if (blob) return blob;
  } catch (err) {
    console.warn('toBlob export failed, falling back to PNG data URL', err);
  }

  const dataUrl = await htmlToImage.toPng(canvas, captureOptions);
  const response = await fetch(dataUrl);
  return response.blob();
}

function sanitizeFilenamePart(input, fallback = 'screen') {
  const cleaned = String(input || '')
    .toLowerCase()
    .replace(/[^a-z0-9-]+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
  return cleaned || fallback;
}

function waitForImageAsset(img) {
  if (!img) return Promise.resolve();
  if (img.loading === 'lazy') img.loading = 'eager';
  const decodePromise = typeof img.decode === 'function' ? img.decode().catch(() => undefined) : Promise.resolve();
  if (img.complete && img.naturalWidth > 0) {
    return decodePromise;
  }

  return new Promise((resolve) => {
    let settled = false;
    const finish = async () => {
      if (settled) return;
      settled = true;
      try {
        await decodePromise;
      } catch {
        // no-op
      }
      resolve();
    };

    const timeout = window.setTimeout(finish, 3500);
    img.addEventListener('load', () => {
      window.clearTimeout(timeout);
      finish();
    }, { once: true });
    img.addEventListener('error', () => {
      window.clearTimeout(timeout);
      finish();
    }, { once: true });
  });
}

async function waitForRenderableAssets(root) {
  if (!root) return;
  if (document.fonts?.ready) {
    try {
      await document.fonts.ready;
    } catch {
      // no-op
    }
  }
  const images = Array.from(root.querySelectorAll('img'));
  await Promise.all(images.map((img) => waitForImageAsset(img)));
  await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
}

async function captureCanvasBlob(canvas, preset) {
  if (!canvas) {
    throw new Error('Capture target is missing');
  }

  let lastError = null;
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      await waitForRenderableAssets(canvas);
      return await renderCanvasToPreset(canvas, preset);
    } catch (err) {
      lastError = err;
      await new Promise((resolve) => setTimeout(resolve, 120 * (attempt + 1)));
    }
  }

  throw lastError || new Error('Failed to capture canvas');
}

function triggerBlobDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
}

function getSectionCanvasByScreenIndex(section, screenIndex) {
  const slot = section?.querySelector(`.screenshot-slot[data-screen-idx="${screenIndex}"]`);
  if (!slot) return null;
  const preferredSelector = selectedExportMode === 'tablet' ? '.ss-canvas-tablet' : '.ss-canvas';
  return slot.querySelector(preferredSelector) || slot.querySelector('.ss-canvas, .ss-canvas-tablet');
}

function attachPerScreenDownloadButtons(section, cppId) {
  if (!section || !cppId) return;
  const slots = section.querySelectorAll('.screenshot-slot[data-screen-idx]');
  slots.forEach((slot) => {
    if (slot.querySelector('.screen-dl-btn')) return;
    const screenIdx = Number(slot.dataset.screenIdx);
    if (Number.isNaN(screenIdx)) return;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'screen-dl-btn';
    btn.textContent = 'Download PNG';
    btn.addEventListener('click', async (event) => {
      event.preventDefault();
      event.stopPropagation();
      await downloadSingleScreen(cppId, screenIdx, { triggerButton: btn });
    });
    slot.appendChild(btn);
  });
}

async function downloadSingleScreen(cppId, screenIdx, options = {}) {
  const section = document.getElementById(`cpp-${cppId}`);
  if (!section) return;
  const screen = getScreen(cppId, screenIdx);
  if (!screen) return;
  const btn = options.triggerButton || null;
  const originalText = btn?.textContent;
  if (btn) {
    btn.textContent = 'Rendering...';
    btn.disabled = true;
  }

  try {
    await ensureExportLibsLoaded();
    ensureSectionRendered(cppId);
    const preset = getExportPreset();
    const canvas = getSectionCanvasByScreenIndex(section, screenIdx);
    if (!canvas) {
      throw new Error('Screen canvas not found');
    }
    const blob = await captureCanvasBlob(canvas, preset);
    const labelPart = sanitizeFilenamePart(screen.label, `screen-${screenIdx + 1}`);
    triggerBlobDownload(blob, `cpp-${sanitizeFilenamePart(cppId)}-${labelPart}-${preset.id}-${screenIdx + 1}.png`);
  } catch (err) {
    console.error('Error exporting single screen:', err);
    alert('Failed to download image: ' + formatExportError(err));
  } finally {
    if (btn) {
      btn.textContent = originalText || 'Download PNG';
      btn.disabled = false;
    }
  }
}

function getPackFilename(cppId, screenIndex, preset) {
  if (preset.id === 'tablet') {
    const padded = String(screenIndex + 1).padStart(2, '0');
    return `cpp-${cppId}-tablet-screen-${padded}.png`;
  }
  return `cpp-${cppId}-screen-${screenIndex + 1}.png`;
}

function mkScreen(cpp, scr, idx) {
  if (selectedExportMode === 'tablet') {
    if (scr.uiType === 'hero') return mkHeroTablet(cpp, scr, idx);
    if (scr.uiType === 'feed' || scr.label === 'Personalization') return mkFeedTablet(cpp, scr, idx);
    if (scr.label === 'Personalized') return mkPersonalizedTablet(cpp, scr, idx);
    if (scr.label === 'Discuss') return mkDiscussTablet(cpp, scr, idx);
    if (scr.label === 'Search') return mkSearchTablet(cpp, scr, idx);
    if (scr.label === 'Features' || scr.label === 'Profile' || scr.uiType === 'profile') return mkFeaturesTablet(cpp, scr, idx);
  }

  if (scr.uiType === 'hero') return mkHeroScreen(cpp, scr, idx);
  if (scr.uiType === 'feed' || scr.label === 'Personalization') return mkMasterFeedScreen(cpp, scr, idx);
  if (scr.label === 'Personalized') return mkPersonalizedScreen(cpp, scr, idx);

async function downloadPack(cppId, options = {}) {
  const preset = getExportPreset();
  const section = document.getElementById(`cpp-${cppId}`);
  if (!section) return;
  const btn = options.triggerButton || section.querySelector('.cpp-header-controls .dl-btn');
  if (!btn) return;
  const originalText = btn.innerHTML;
  btn.innerHTML = 'Generating Zip...';
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '0.7';

  try {
    btn.innerHTML = 'Loading export tools...';
    await ensureExportLibsLoaded();
    ensureSectionRendered(cppId);
    const zip = new JSZip();
    const exportCanvases = section.querySelectorAll(selectedExportMode === 'tablet' ? '.ss-canvas-tablet' : '.ss-canvas');

    for (let i = 0; i < exportCanvases.length; i++) {
      const canvas = exportCanvases[i];

      btn.innerHTML = `Rendering ${i + 1}/${exportCanvases.length}...`;

      const blob = await captureCanvasBlob(canvas, preset);
      zip.file(getPackFilename(cppId, i, preset), blob);

      // Add a small delay between renders to allow UI to update
      await new Promise(r => setTimeout(r, 100));
    }
    
    btn.innerHTML = 'Saving Zip...';
    
    const content = await zip.generateAsync({type: "blob"});
    triggerBlobDownload(content, `cpp-${cppId}-${preset.id}-screenshots.zip`);
  } catch (err) {
    console.error('Error exporting images:', err);
    alert('Failed to download images: ' + formatExportError(err) + '\n\nTry running via a local web server (e.g. `npx serve` or `python3 -m http.server`) if you are using file:// protocol.');
  } finally {
    btn.innerHTML = originalText;
    btn.style.pointerEvents = 'auto';
    btn.style.opacity = '1';
  }
}

async function downloadAllPacks() {
  const btn = document.getElementById('download-all-btn');
  if (!btn) return;
  const originalHTML = btn.innerHTML;
  btn.textContent = 'Generating...';
  btn.disabled = true;

  const preset = getExportPreset();

  try {
    btn.textContent = 'Loading export tools...';
    await ensureExportLibsLoaded();
    const zip = new JSZip();

    for (let topicIndex = 0; topicIndex < CPP.length; topicIndex++) {
      const topic = CPP[topicIndex];
      ensureSectionRendered(topic.id);
      const section = document.getElementById(`cpp-${topic.id}`);
      if (!section) continue;
      const canvases = section.querySelectorAll(selectedExportMode === 'tablet' ? '.ss-canvas-tablet' : '.ss-canvas');

      for (let screenIndex = 0; screenIndex < canvases.length; screenIndex++) {
        btn.textContent = `Rendering ${topicIndex + 1}/${CPP.length} · ${screenIndex + 1}/${canvases.length}`;
        const blob = await captureCanvasBlob(canvases[screenIndex], preset);
        zip.file(getPackFilename(topic.id, screenIndex, preset), blob);
        await new Promise((resolve) => setTimeout(resolve, 80));
      }
    }

    btn.textContent = 'Saving...';
    const content = await zip.generateAsync({ type: 'blob' });
    triggerBlobDownload(content, `cpp-all-topics-${preset.id}-screenshots.zip`);
  } catch (err) {
    console.error('Error exporting all packs:', err);
    alert('Failed to download all images: ' + formatExportError(err));
  } finally {
    btn.innerHTML = originalHTML;
    btn.disabled = false;
  }
}

function getCpp(cppId) {
  return CPP.find((topic) => topic.id === cppId);
}

function getScreen(cppId, screenIdx) {
  const cpp = getCpp(cppId);
  if (!cpp) return null;
  return cpp.screens[screenIdx] || null;
}

function getScreenEditorKind(screen) {
  if (!screen) return null;
  if (screen.uiType === 'hero') return 'hero';
  if (screen.uiType === 'feed' || screen.label === 'Feed' || screen.label === 'Personalization') return 'feed';
  if (screen.label === 'Personalized') return 'personalized';
  if (screen.label === 'Discuss') return 'discuss';
  if (screen.label === 'Search') return 'search';
  if (screen.label === 'Features' || screen.label === 'Profile' || screen.uiType === 'profile') return 'features';
  return null;
}

function getScreenEditorFieldSchema(screen) {
  const kind = getScreenEditorKind(screen);
  const schema = SCREEN_EDITOR_FIELDS[kind] || [];
  return schema.map((field) => ({
    ...field,
    id: `editor-field-${field.key}`,
  }));
}

function getFieldDefaultValue(field, screen) {
  if (typeof field.defaultValue === 'function') {
    return field.defaultValue(screen) || '';
  }
  return field.defaultValue || '';
}

function getLegacyFieldValue(screen, key) {
  const imageValue = screen?.imageAssets?.[key];
  if (typeof imageValue === 'string') return imageValue;

  switch (key) {
    case 'heroTitleTop':
    case 'feedTitleHtml':
    case 'personalizedTitleHtml':
    case 'discussTitleHtml':
    case 'searchTopLineHtml':
      return screen?.hl || '';
    case 'heroTitleBold':
    case 'feedSubtitleHtml':
    case 'personalizedSubtitleHtml':
    case 'discussSubtitleHtml':
    case 'searchMainTitleHtml':
      return screen?.sub || '';
    case 'heroReviewsText':
      return screen?.reviewsText || '';
    case 'heroBadge1Value':
      return screen?.badge1?.val || '';
    case 'heroBadge1Label':
      return screen?.badge1?.label || '';
    case 'heroBadge1Sub':
      return screen?.badge1?.sub || '';
    case 'heroBadge2Value':
      return screen?.badge2?.val || '';
    case 'heroBadge2Sub':
      return screen?.badge2?.sub || '';
    case 'heroBadge1Icon':
      return screen?.heroImageUrl || '';
    case 'personalizedQuoteHtml':
      return screen?.quote || '';
    default:
      return undefined;
  }
}

function getScreenEditorValues(screen) {
  const schema = getScreenEditorFieldSchema(screen);
  const values = {};
  schema.forEach((field) => {
    const stored = screen?.editorFields?.[field.key];
    const legacy = getLegacyFieldValue(screen, field.key);
    const value = typeof stored === 'string' ? stored : (typeof legacy === 'string' ? legacy : getFieldDefaultValue(field, screen));
    values[field.key] = value || '';
  });
  return values;
}

function applyScreenEditorValues(cppId, screenIdx, values) {
  const screen = getScreen(cppId, screenIdx);
  if (!screen || !values || typeof values !== 'object') return;
  screen.editorFields = { ...(screen.editorFields || {}) };
  screen.imageAssets = { ...(screen.imageAssets || {}) };

  Object.entries(values).forEach(([key, value]) => {
    if (typeof value !== 'string') return;
    screen.editorFields[key] = value;
    screen.imageAssets[key] = value;

    switch (key) {
      case 'heroTitleTop':
        screen.hl = value;
        break;
      case 'heroTitleBold':
        screen.sub = value;
        break;
      case 'heroReviewsText':
        screen.reviewsText = value;
        break;
      case 'heroBadge1Value':
        screen.badge1 = { ...(screen.badge1 || {}), val: value };
        break;
      case 'heroBadge1Label':
        screen.badge1 = { ...(screen.badge1 || {}), label: value };
        break;
      case 'heroBadge1Sub':
        screen.badge1 = { ...(screen.badge1 || {}), sub: value };
        break;
      case 'heroBadge2Value':
        screen.badge2 = { ...(screen.badge2 || {}), val: value };
        break;
      case 'heroBadge2Sub':
        screen.badge2 = { ...(screen.badge2 || {}), sub: value };
        break;
      case 'heroBadge1Icon':
        screen.heroImageUrl = value;
        break;
      case 'feedTitleHtml':
      case 'personalizedTitleHtml':
      case 'discussTitleHtml':
      case 'searchTopLineHtml':
        screen.hl = value;
        break;
      case 'feedSubtitleHtml':
      case 'personalizedSubtitleHtml':
      case 'discussSubtitleHtml':
      case 'searchMainTitleHtml':
        screen.sub = value;
        break;
      case 'personalizedQuoteHtml':
        screen.quote = value;
        break;
      default:
        break;
    }
  });
}

function renderEditorFields(schema) {
  const grid = document.getElementById('editor-fields-grid');
  if (!grid) return;
  grid.innerHTML = schema.map((field) => `
    <div class="editor-field">
      <div class="editor-label-row">
        <label for="${field.id}">${field.label}</label>
        <span class="editor-count" id="count-${field.id}">0 chars</span>
      </div>
      ${field.inputType === 'textarea'
        ? `<textarea id="${field.id}" placeholder="${field.placeholder || 'Enter value...'}"></textarea>`
        : `<input id="${field.id}" type="${field.inputType || 'text'}" placeholder="${field.placeholder || (field.inputType === 'url' ? 'https://... or local/path.png' : 'Enter value...')}" />`
      }
      ${field.help ? `<small>${field.help}</small>` : ''}
    </div>
  `).join('');

  schema.forEach((field) => {
    const input = document.getElementById(field.id);
    if (!input) return;
    input.addEventListener('input', applyEditorChanges);
    input.addEventListener('input', () => updateFieldCount(field.id));
  });
}

function getEditorInputValues() {
  const values = {};
  editorState.fieldSchema.forEach((field) => {
    const input = document.getElementById(field.id);
    if (!input) return;
    values[field.key] = field.inputType === 'url' ? input.value.trim() : input.value;
  });
  return values;
}

function updateUrlForState() {
  const url = new URL(window.location.href);
  if (editorState.cppId) {
    url.searchParams.set('cpp', editorState.cppId);
    url.searchParams.set('editCpp', editorState.cppId);
    url.searchParams.set('screen', String(editorState.screenIdx));
  } else {
    url.searchParams.delete('editCpp');
    url.searchParams.delete('screen');
  }
  window.history.replaceState({}, '', url.toString());
}

function setEditorStatus(text, stateClass = 'dirty') {
  const status = document.getElementById('editor-status');
  if (!status) return;
  status.textContent = text;
  status.classList.remove('saved', 'dirty', 'downloading');
  status.classList.add(stateClass);
}

function updateFieldCount(id) {
  const input = document.getElementById(id);
  const count = document.getElementById(`count-${id}`);
  if (!input || !count) return;
  count.textContent = `${input.value.length} chars`;
}

function updateAllFieldCounts() {
  editorState.fieldIds.forEach(updateFieldCount);
}

function setPreviewZoom(percent) {
  editorState.zoomPercent = percent;
  const scaleEl = document.getElementById('editor-preview-scale');
  const zoomValue = document.getElementById('editor-zoom-value');
  if (scaleEl) {
    scaleEl.style.transform = `scale(${percent / 100})`;
  }
  if (zoomValue) {
    zoomValue.textContent = `${percent}%`;
  }
}

function syncEditorActionButtons() {
  const saveBtn = document.getElementById('editor-save-btn');
  const resetBtn = document.getElementById('editor-reset-btn');
  if (saveBtn) saveBtn.disabled = !editorState.hasUnsavedChanges;
  if (resetBtn) resetBtn.disabled = !editorState.cppId;
}

function markEditorDirty() {
  if (editorState.isHydrating) return;
  editorState.hasUnsavedChanges = true;
  setEditorStatus('Unsaved changes', 'dirty');
  syncEditorActionButtons();

  if (editorState.autoSaveTimer) {
    clearTimeout(editorState.autoSaveTimer);
  }
  editorState.autoSaveTimer = setTimeout(() => {
    if (!editorState.hasUnsavedChanges) return;
    saveEditorChanges({ silent: true });
  }, 750);
}

function markEditorSaved() {
  editorState.hasUnsavedChanges = false;
  if (editorState.autoSaveTimer) {
    clearTimeout(editorState.autoSaveTimer);
    editorState.autoSaveTimer = null;
  }
  setEditorStatus('Saved', 'saved');
  syncEditorActionButtons();
}

function getStoredOverrides() {
  try {
    const raw = localStorage.getItem(EDITOR_STORAGE_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    if (parsed && typeof parsed === 'object') return parsed;
    return {};
  } catch {
    return {};
  }
}

function setStoredOverrides(overrides) {
  localStorage.setItem(EDITOR_STORAGE_KEY, JSON.stringify(overrides));
}

function getOverrideKey(cppId, screenIdx) {
  return `${cppId}::${screenIdx}`;
}

function getScreenOverridePayload(screen) {
  return {
    editorFields: getScreenEditorValues(screen),
  };
}

function applyLegacyHeroPayload(screen, payload) {
  if (!screen || screen.uiType !== 'hero' || !payload || typeof payload !== 'object') return;
  if (typeof payload.hl === 'string') screen.hl = payload.hl;
  if (typeof payload.sub === 'string') screen.sub = payload.sub;
  if (typeof payload.reviewsText === 'string') screen.reviewsText = payload.reviewsText;
  screen.badge1 = {
    ...(screen.badge1 || {}),
    ...(payload.badge1 || {}),
  };
  if (typeof payload.heroImageUrl === 'string') {
    screen.heroImageUrl = payload.heroImageUrl;
    screen.imageAssets = {
      ...(screen.imageAssets || {}),
      heroBadge1Icon: payload.heroImageUrl,
    };
  }
}

function applyScreenOverride(cppId, screenIdx, payload) {
  const screen = getScreen(cppId, screenIdx);
  if (!screen) return;
  if (payload?.editorFields && typeof payload.editorFields === 'object') {
    applyScreenEditorValues(cppId, screenIdx, payload.editorFields);
    return;
  }
  if (payload?.imageAssets && typeof payload.imageAssets === 'object') {
    applyScreenEditorValues(cppId, screenIdx, payload.imageAssets);
    return;
  }
  applyLegacyHeroPayload(screen, payload);
}

function hydrateSavedScreenOverrides() {
  const nextOverrides = getStoredOverrides();
  Object.entries(nextOverrides).forEach(([key, payload]) => {
    const [cppId, rawIdx] = key.split('::');
    const idx = Number(rawIdx);
    if (!cppId || Number.isNaN(idx)) return;
    applyScreenOverride(cppId, idx, payload);
  });

  try {
    const legacyRaw = localStorage.getItem(LEGACY_HERO_STORAGE_KEY);
    if (!legacyRaw) return;
    const legacyOverrides = JSON.parse(legacyRaw);
    if (!legacyOverrides || typeof legacyOverrides !== 'object') return;
    Object.entries(legacyOverrides).forEach(([key, payload]) => {
      const [cppId, rawIdx] = key.split('::');
      const idx = Number(rawIdx);
      if (!cppId || Number.isNaN(idx)) return;
      applyScreenOverride(cppId, idx, payload);
    });
  } catch {
    // no-op
  }
}

function renderEditorPreview() {
  const cpp = getCpp(editorState.cppId);
  if (!cpp) return;
  const screen = cpp.screens[editorState.screenIdx];
  if (!screen) return;
  const preview = mkScreen(cpp, screen, editorState.screenIdx);
  document.getElementById('editor-preview').innerHTML = preview;
  setPreviewZoom(editorState.zoomPercent);
}

function applyEditorChanges() {
  const screen = getScreen(editorState.cppId, editorState.screenIdx);
  if (!screen) return;
  applyScreenEditorValues(editorState.cppId, editorState.screenIdx, getEditorInputValues());

  renderEditorPreview();
  renderDT();
  switchCPP(editorState.cppId);
  markEditorDirty();
}

function openScreenEditor(cppId, screenIdx) {
  const screen = getScreen(cppId, screenIdx);
  if (!screen) return;
  const schema = getScreenEditorFieldSchema(screen);
  if (!schema.length) {
    alert('No editable fields found for this screenshot.');
    return;
  }

  editorState.cppId = cppId;
  editorState.screenIdx = screenIdx;
  editorState.fieldSchema = schema;
  editorState.fieldIds = schema.map((field) => field.id);

  const cpp = getCpp(cppId);
  const defaults = getScreenEditorValues(screen);
  editorState.currentDefaults = defaults;
  const title = `${cpp?.name || 'CPP'} — ${screen.label} editor`;
  document.getElementById('editor-page-title').textContent = title;
  document.getElementById('editor-top-subtitle').textContent = `${screen.label} content editor · live preview and fast controls`;
  document.getElementById('editor-fields-title').textContent = `${screen.label} editable fields`;
  document.getElementById('editor-form-description').textContent = `Editing ${schema.length} field${schema.length > 1 ? 's' : ''} (text + images). Autosave runs after a short pause.`;
  renderEditorFields(schema);

  editorState.isHydrating = true;
  schema.forEach((field) => {
    const input = document.getElementById(field.id);
    if (!input) return;
    input.value = defaults[field.key] || '';
  });
  updateAllFieldCounts();
  editorState.isHydrating = false;

  const editorSel = document.getElementById('editor-export-select');
  if (editorSel) editorSel.value = selectedExportMode;
  renderEditorPreview();
  showView('editor');
  updateUrlForState();
  markEditorSaved();
}

function backFromEditor() {
  if (editorState.hasUnsavedChanges) {
    const shouldLeave = window.confirm('You have unsaved changes. Leave this editor anyway?');
    if (!shouldLeave) return;
    editorState.hasUnsavedChanges = false;
    setEditorStatus('Changes discarded', 'saved');
  }
  if (!editorState.cppId) {
    showView('dt');
    return;
  }
  showView('dt');
  switchCPP(editorState.cppId);
  editorState.cppId = null;
  editorState.screenIdx = null;
  editorState.currentDefaults = null;
  editorState.fieldSchema = [];
  editorState.fieldIds = [];
  updateUrlForState();
  syncEditorActionButtons();
}

function saveEditorChanges(options = {}) {
  const { silent = false } = options;
  const screen = getScreen(editorState.cppId, editorState.screenIdx);
  if (!screen) return;

  const overrides = getStoredOverrides();
  overrides[getOverrideKey(editorState.cppId, editorState.screenIdx)] = getScreenOverridePayload(screen);
  setStoredOverrides(overrides);
  markEditorSaved(silent);
  if (!silent) {
    setEditorStatus('Saved to browser', 'saved');
  }
}

function resetCurrentEditorFields() {
  const screen = getScreen(editorState.cppId, editorState.screenIdx);
  if (!screen || !editorState.currentDefaults) return;

  const shouldReset = window.confirm('Reset all editable fields back to defaults for this screenshot?');
  if (!shouldReset) return;

  applyScreenEditorValues(editorState.cppId, editorState.screenIdx, editorState.currentDefaults);

  openScreenEditor(editorState.cppId, editorState.screenIdx);
  markEditorDirty();
}

async function downloadCurrentEditorImage() {
  const screen = getScreen(editorState.cppId, editorState.screenIdx);
  if (!screen) return;
  const previewCanvas = document.querySelector('#editor-preview .ss-canvas, #editor-preview .ss-canvas-tablet');
  if (!previewCanvas) return;

  const btn = document.getElementById('editor-download-btn');
  const originalText = btn.textContent;
  btn.textContent = 'Preparing...';
  btn.disabled = true;
  setEditorStatus('Preparing download...', 'downloading');

  try {
    await ensureExportLibsLoaded();
    const preset = getExportPreset();
    const blob = await captureCanvasBlob(previewCanvas, preset);
    const labelPart = sanitizeFilenamePart(screen.label, `screen-${editorState.screenIdx + 1}`);
    triggerBlobDownload(blob, `cpp-${sanitizeFilenamePart(editorState.cppId)}-${labelPart}-${preset.id}-${editorState.screenIdx + 1}.png`);
    setEditorStatus('Downloaded', 'saved');
  } catch (err) {
    console.error('Error downloading image:', err);
    alert('Failed to download image: ' + formatExportError(err));
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

function showView(v) {
  const isEditorVisible = document.getElementById('view-editor').style.display === 'block';
  if (isEditorVisible && v !== 'editor' && editorState.hasUnsavedChanges) {
    const shouldLeave = window.confirm('You have unsaved changes. Leave this editor anyway?');
    if (!shouldLeave) return;
    editorState.hasUnsavedChanges = false;
    setEditorStatus('Changes discarded', 'saved');
    syncEditorActionButtons();
  }
  document.getElementById('view-dt').style.display = v==='dt'?'block':'none';
  document.getElementById('view-editor').style.display = v==='editor'?'block':'none';
}

hydrateSavedScreenOverrides();
renderDT();
updateDownloadAllButton();
updateEditorPreviewMeta();

document.getElementById('editor-zoom').addEventListener('input', (event) => {
  const value = Number(event.target.value);
  if (Number.isNaN(value)) return;
  setPreviewZoom(value);
});

window.addEventListener('keydown', (event) => {
  const saveHotkey = (event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 's';
  if (!saveHotkey) return;
  if (document.getElementById('view-editor').style.display !== 'block') return;
  event.preventDefault();
  saveEditorChanges();
});

window.addEventListener('beforeunload', (event) => {
  if (!editorState.hasUnsavedChanges) return;
  event.preventDefault();
  event.returnValue = '';
});
syncEditorActionButtons();

const initialCPP = new URLSearchParams(window.location.search).get('cpp');
if (initialCPP && CPP.some((topic) => topic.id === initialCPP)) {
  switchCPP(initialCPP);
}

const initialEditCPP = new URLSearchParams(window.location.search).get('editCpp');
const initialScreenIdx = Number(new URLSearchParams(window.location.search).get('screen'));
if (initialEditCPP && Number.isInteger(initialScreenIdx) && initialScreenIdx >= 0) {
  openScreenEditor(initialEditCPP, initialScreenIdx);
}
</script>
</body>
</html>
